<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKB Phase Framework | 3D System Map</title>
    <script src="//unpkg.com/3d-force-graph"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050510; color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        #3d-graph { width: 100vw; height: 100vh; }
        
        .overlay {
            position: absolute; top: 24px; left: 24px; z-index: 10;
            pointer-events: none;
        }
        .nav-back {
            pointer-events: auto; text-decoration: none; color: #6450ff;
            font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; display: block;
        }
        .title { font-size: 2.2rem; font-weight: 900; margin: 0; letter-spacing: -0.02em; }
        .subtitle { font-size: 1rem; color: #8892b0; margin-top: 4px; opacity: 0.8; }
        
        .legend {
            position: absolute; bottom: 24px; left: 24px; z-index: 10;
            padding: 16px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="overlay">
        <a href="index.html" class="nav-back">← Back to Feed</a>
        <h1 class="title">DKB System Map 3D</h1>
        <p class="subtitle">Live Architecture: Theory ⟷ Breakthroughs</p>
    </div>

    <div id="3d-graph"></div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#ff33cc"></div> Master Equation</div>
        <div class="legend-item"><div class="dot" style="background:#6450ff"></div> Core Theory</div>
        <div class="legend-item"><div class="dot" style="background:#33ff33"></div> Recent Breakthroughs</div>
    </div>

    <script>
        // Fetch dynamic graph data generated by server.py
        fetch('graph_data.json')
            .then(res => res.json())
            .then(data => {
                const Graph = ForceGraph3D()
                    (document.getElementById('3d-graph'))
                    .graphData(data)
                    .nodeLabel(node => `
                        <div style="background: rgba(5,5,16,0.95); padding: 12px; border: 1px solid ${node.color}; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
                            <div style="color:${node.color}; font-weight:900; font-size: 1rem; margin-bottom: 4px;">${node.id}</div>
                            <div style="font-size:0.9rem; color: #fff; margin-bottom: 4px;">${node.name}</div>
                            <div style="font-size:0.75rem; color: #8892b0; font-family: 'JetBrains Mono', monospace;">${node.desc}</div>
                        </div>
                    `)
                    .nodeColor(node => node.color)
                    .nodeVal(node => node.val)
                    .nodeOpacity(0.9)
                    .linkWidth(1.5)
                    .linkColor(() => 'rgba(100,80,255,0.2)')
                    .linkDirectionalParticles(2)
                    .linkDirectionalParticleSpeed(0.005)
                    .backgroundColor('#050510')
                    .showNavInfo(false);

                // Global forces
                Graph.d3Force('charge').strength(-150);
                Graph.d3Force('link').distance(100);
            })
            .catch(err => {
                console.error("Error loading graph data:", err);
                document.body.innerHTML += '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:red;">Failed to load graph_data.json. Please ensure server.py --build has been run.</div>';
            });
    </script>
</body>
</html>
